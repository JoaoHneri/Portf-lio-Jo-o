<article class="experience">
  <span class="index">{{ index < 10 ? '0' + index : index }}</span>
  <div class="company">
    <img
      *ngIf="logo"
      [src]="logo"
      [alt]="'Logo da ' + nameCompany"
      loading="lazy"
    />
    <div>
      <h3>{{ role }}</h3>
      <p>{{ nameCompany }}</p>
    </div>
  </div>
  <div class="details">
    <time>{{ timeExperience }}</time>
    <p>{{ descriptionExperience }}</p>
    <ul aria-label="Tecnologias utilizadas">
      <li *ngFor="let item of tec">{{ item }}</li>
    </ul>
  </div>
</article>
