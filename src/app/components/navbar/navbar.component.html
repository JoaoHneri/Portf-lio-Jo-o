<header [class.scrolled]="scrolled">
  <nav
    class="container"
    aria-label="Navegação principal"
  >
    <a
      class="brand"
      href="#inicio"
      (click)="closeMenu()"
      >JH<span>.</span></a
    >

    <div
      class="links"
      [class.open]="menuOpen"
    >
      <a
        href="#sobre"
        (click)="closeMenu()"
        >{{ lang.t.about }}</a
      >
      <a
        href="#experiencia"
        (click)="closeMenu()"
        >{{ lang.t.experience }}</a
      >
      <a
        href="#projetos"
        (click)="closeMenu()"
        >{{ lang.t.projects }}</a
      >
      <a
        class="contact"
        href="mailto:joaohenrique.dev00@gmail.com"
      >
        {{ lang.t.talk }} <span aria-hidden="true">↗</span>
      </a>
    </div>

    <div class="nav-actions">
      <div
        class="language-switcher"
        aria-label="Selecionar idioma"
      >
        <button
          type="button"
          [class.active]="lang.language === 'pt-BR'"
          [attr.aria-pressed]="lang.language === 'pt-BR'"
          (click)="lang.setLanguage('pt-BR')"
        >
          PT
        </button>
        <span aria-hidden="true">|</span>
        <button
          type="button"
          [class.active]="lang.language === 'en'"
          [attr.aria-pressed]="lang.language === 'en'"
          (click)="lang.setLanguage('en')"
        >
          EN
        </button>
      </div>

      <button
        class="menu"
        type="button"
        (click)="menuOpen = !menuOpen"
        [attr.aria-expanded]="menuOpen"
        aria-label="Abrir menu"
      >
        <i></i><i></i>
      </button>
    </div>
  </nav>
</header>
